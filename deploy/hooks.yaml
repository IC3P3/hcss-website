- id: deploy
  execute-command: /srv/hcss/deploy.sh
  command-working-directory: /srv/hcss
  include-command-output-in-response: true
  include-command-output-in-response-on-error: true
  trigger-rule-mismatch-http-response-code: 403
  trigger-rule:
      match:
          type: value
          value: '{{ getenv "DEPLOY_TOKEN" }}'
          parameter:
              source: header
              name: X-Deploy-Token
